# =============================================================================
# Database connection settings — loaded by framework.config.AppConfig
# Spring Boot equivalent: spring.datasource.url / username / password
# =============================================================================

# H2 in-memory database — no install needed; data disappears when the app exits.
# DB_CLOSE_DELAY=-1 keeps the DB alive while any connection is open.
db.url=jdbc:h2:mem:customspring;DB_CLOSE_DELAY=-1

# H2 default superuser credentials (fine for local dev only — never use in production)
db.username=sa
db.password=

# --- To switch to PostgreSQL, replace the above with: ---
# db.url=jdbc:postgresql://localhost:5432/mydb
# db.username=postgres
# db.password=secret
# (and add org.postgresql:postgresql to pom.json dependencies)
